openapi: 3.1.0
info:
  title: AI Interviewer Platform API
  version: 0.1.0
  description: |
    REST API for the AI Interviewer Platform.
    All endpoints are Next.js App Router route handlers under /api/.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://<your-vercel-url>
    description: Production (Vercel)

security: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: HttpOnly JWT cookie set on login or signup. Required for protected endpoints.

tags:
  - name: sessions
    description: Interview session lifecycle
  - name: interview
    description: AI turn-taking during an active interview
  - name: evaluate
    description: Post-interview structured evaluation
  - name: auth
    description: Authentication — signup, login, logout, JWT session, and password reset

paths:
  /api/auth/signup:
    post:
      summary: Create a new user account
      operationId: signupUser
      tags: [auth]
      description: |
        Registers a new user with an email address and password. Validates that
        all fields are present, that the password is at least 8 characters, and
        that `password` matches `confirmPassword`. On success, creates a `User`
        row (password hashed with bcrypt cost factor 12), signs a 7-day JWT,
        sets an `auth_token` HttpOnly cookie, and returns `201` with the new
        user's `id` and `email`. Returns `409` if the email is already registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, confirmPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: secret123
                confirmPassword:
                  type: string
                  format: password
                  minLength: 8
                  example: secret123
      responses:
        '201':
          description: Account created. Sets `auth_token` HttpOnly cookie (Max-Age=604800).
          headers:
            Set-Cookie:
              description: "auth_token=<jwt>; HttpOnly; SameSite=Lax; Path=/; Max-Age=604800"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [id, email]
                properties:
                  id:
                    type: string
                    example: clxxx
                  email:
                    type: string
                    format: email
                    example: user@example.com
        '400':
          description: Validation error — missing field, password too short, or passwords do not match.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
              examples:
                emailRequired:
                  summary: Email is missing
                  value:
                    error: "Email is required"
                passwordTooShort:
                  summary: Password is shorter than 8 characters
                  value:
                    error: "Password must be at least 8 characters"
                passwordsMismatch:
                  summary: Passwords do not match
                  value:
                    error: "Passwords do not match"
        '409':
          description: Email address is already registered.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Email already registered"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

  /api/auth/login:
    post:
      summary: Log in with email and password
      operationId: loginUser
      tags: [auth]
      description: |
        Authenticates a user with their email and password.
        On success, sets an `auth_token` HttpOnly cookie containing a signed JWT
        (HS256, 7-day expiry). Returns the authenticated user's `id` and `email`.
        Both "email not found" and "wrong password" cases return the same
        `401 { error: "Invalid credentials" }` response to prevent email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        '200':
          description: Login successful. Sets `auth_token` HttpOnly cookie (Max-Age=604800).
          headers:
            Set-Cookie:
              description: "auth_token=<jwt>; HttpOnly; SameSite=Lax; Path=/; Max-Age=604800"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [id, email]
                properties:
                  id:
                    type: string
                    example: clxxx
                  email:
                    type: string
                    format: email
                    example: user@example.com
        '400':
          description: Missing email or password field.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Email and password are required"
        '401':
          description: Email not found or password incorrect (same message in both cases).
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Invalid credentials"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

  /api/auth/forgot-password:
    post:
      summary: Request a password reset token
      operationId: forgotPassword
      tags:
        - auth
      description: |
        Accepts an email address. If the email is registered, deletes any existing
        reset tokens for that address, generates a new cryptographically random
        64-character hex token (32 bytes via Node.js crypto), stores it with a
        1-hour expiry, and returns `{ token }`. If the email is NOT registered,
        returns `{ token: null }` with the same 200 status to prevent email
        enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '200':
          description: |
            Always returned regardless of whether the email exists. When the email
            is registered, `token` is a 64-character hex string the client uses to
            redirect to /reset-password?token=<token>. When the email is not
            registered, `token` is null.
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                properties:
                  token:
                    oneOf:
                      - type: string
                        example: a3f2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
                      - type: 'null'
        '400':
          description: Email field is missing or empty.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Email is required
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Internal server error

  /api/auth/reset-password:
    post:
      summary: Reset a user's password using a valid reset token
      operationId: resetPassword
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
                - confirmPassword
              properties:
                token:
                  type: string
                  description: The 64-character hex reset token from the forgot-password response
                  example: a3f2b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
                password:
                  type: string
                  minLength: 8
                  description: The new password (minimum 8 characters)
                  example: newsecurepassword
                confirmPassword:
                  type: string
                  description: Must match the password field
                  example: newsecurepassword
      responses:
        '200':
          description: Password successfully reset
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                example:
                  success: true
        '400':
          description: Validation error or invalid/expired token
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
              examples:
                tokenRequired:
                  summary: Token is missing
                  value:
                    error: Token is required
                passwordTooShort:
                  summary: Password is too short
                  value:
                    error: Password must be at least 8 characters
                passwordsMismatch:
                  summary: Passwords do not match
                  value:
                    error: Passwords do not match
                invalidToken:
                  summary: Token not found or expired
                  value:
                    error: Invalid or expired reset token
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
              example:
                error: Internal server error

  /api/auth/logout:
    post:
      summary: Log out the current user
      operationId: logoutUser
      tags: [auth]
      security: []
      description: |
        Clears the `auth_token` HttpOnly cookie by setting it with `Max-Age=0`.
        No request body is required. No database query is performed.
      responses:
        '200':
          description: Logout successful. Clears the `auth_token` cookie.
          headers:
            Set-Cookie:
              description: "auth_token=; HttpOnly; SameSite=Lax; Path=/; Max-Age=0"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                    example: true
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

  /api/auth/me:
    get:
      summary: Get the currently authenticated user
      operationId: getMe
      tags: [auth]
      security:
        - cookieAuth: []
      description: |
        Reads the `auth_token` cookie from the request, verifies the JWT,
        and returns the authenticated user's `id` and `email`.
        If the cookie is absent, expired, or invalid — or if the user no longer
        exists in the database — returns `401 { error: "Unauthenticated" }`.
      responses:
        '200':
          description: Authenticated user details.
          content:
            application/json:
              schema:
                type: object
                required: [id, email]
                properties:
                  id:
                    type: string
                    example: clxxx
                  email:
                    type: string
                    format: email
                    example: user@example.com
        '401':
          description: Cookie absent, JWT invalid/expired, or user deleted.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Unauthenticated"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

  /api/sessions:
    post:
      summary: Create a new interview session
      operationId: createSession
      tags: [sessions]
      security:
        - cookieAuth: []
      description: |
        Creates a new `Session` row tied to the given `jobId` and the authenticated
        user (extracted from the `auth_token` cookie). If the cookie is missing or
        invalid the session is still created with `userId = null` — the auth
        middleware already protects this route. Returns `201` with the new session id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobId]
              properties:
                jobId:
                  type: string
                  description: The cuid id of an existing Job row.
                  example: clswe0001000000000000000001
      responses:
        '201':
          description: Session created successfully.
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    example: clsession000000000000000001
        '400':
          description: Validation error — jobId is missing, not a string, or empty.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "jobId is required"
        '404':
          description: No Job row found with the provided jobId.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Job not found"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

  /api/interview:
    post:
      summary: Submit a user's interview answer and receive the next question
      operationId: submitInterviewTurn
      tags: [interview]
      security:
        - cookieAuth: []
      description: |
        Accepts the candidate's spoken answer for the current turn. Validates the session
        is IN_PROGRESS, saves the user answer turn (and the initial AI question turn if
        this is the first call for the session), then makes a synchronous (non-streaming)
        call to the Claude API to generate the next interview question. Returns a structured
        JSON response containing the next question, a completion flag, and a `decisionState`
        block describing the AI's current understanding of the interview coverage.

        If `isComplete` is true, the session is also marked as COMPLETED in the database.

        The `turnNumber` field is silently ignored if present in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, userAnswer, currentQuestion]
              properties:
                sessionId:
                  type: string
                  example: clyyyy
                userAnswer:
                  type: string
                  example: I have 5 years of experience building distributed systems.
                currentQuestion:
                  type: string
                  example: "Tell me about your experience with TypeScript."
      responses:
        '200':
          description: |
            Turn persisted and Claude responded. Returns the next question, a completion
            flag, and the AI decision state reflecting the current interview coverage.
          content:
            application/json:
              schema:
                type: object
                required: [nextQuestion, isComplete, decisionState]
                properties:
                  nextQuestion:
                    type: string
                    example: "You mentioned distributed systems — can you walk me through how you'd design a rate limiter?"
                  isComplete:
                    type: boolean
                    example: false
                  decisionState:
                    type: object
                    required: [detectedSkills, coveredTopics, remainingGaps, questionRationale]
                    properties:
                      detectedSkills:
                        type: array
                        items:
                          type: string
                        example: ["TypeScript", "API Design"]
                      coveredTopics:
                        type: array
                        items:
                          type: string
                        example: ["Background", "Technical Experience"]
                      remainingGaps:
                        type: array
                        items:
                          type: string
                        example: ["System Design", "Team Collaboration"]
                      questionRationale:
                        type: string
                        example: "Candidate demonstrated TypeScript fluency. Probing system design gap next."
              examples:
                inProgress:
                  summary: Interview still in progress
                  value:
                    nextQuestion: "You mentioned distributed systems — can you walk me through how you'd design a rate limiter?"
                    isComplete: false
                    decisionState:
                      detectedSkills: ["TypeScript", "API Design"]
                      coveredTopics: ["Background", "Technical Experience"]
                      remainingGaps: ["System Design", "Team Collaboration"]
                      questionRationale: "Candidate demonstrated TypeScript fluency. Probing system design gap next."
                complete:
                  summary: Interview complete
                  value:
                    nextQuestion: "Thank you for your time today. We've covered all the key areas — we'll be in touch with next steps."
                    isComplete: true
                    decisionState:
                      detectedSkills: ["TypeScript", "API Design", "System Design", "Team Collaboration"]
                      coveredTopics: ["Background", "Technical Experience", "System Design", "Collaboration & Leadership"]
                      remainingGaps: []
                      questionRationale: "All required skills have been assessed and at least 6 questions asked. Closing the interview."
        '400':
          description: Validation error — missing or invalid field.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "sessionId, userAnswer, and currentQuestion are required"
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Session not found"
        '409':
          description: Session is not in progress (COMPLETED or ABANDONED).
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Session is not in progress"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
              examples:
                aiUnavailable:
                  summary: Claude API call failed or response could not be parsed
                  value:
                    error: "AI service unavailable. Please try again."
                internalError:
                  summary: Any other unexpected server error
                  value:
                    error: "Internal server error"

  /api/sessions/{sessionId}:
    patch:
      summary: Mark an in-progress session as ABANDONED
      operationId: abandonSession
      tags: [sessions]
      security:
        - cookieAuth: []
      description: |
        Marks an in-progress interview session as ABANDONED. The caller must be the
        authenticated owner of the session (verified via the `auth_token` cookie).
        Sets `ended_at` to the current timestamp. Returns 409 if the session is
        already COMPLETED or ABANDONED.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: The cuid id of the session to abandon.
          schema:
            type: string
            example: clsession000000000000000001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ABANDONED]
                  example: ABANDONED
      responses:
        '200':
          description: Session successfully marked as ABANDONED.
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id:
                    type: string
                    example: clsession000000000000000001
                  status:
                    type: string
                    enum: [ABANDONED]
                    example: ABANDONED
        '400':
          description: Validation error — body is not valid JSON or status is not ABANDONED.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
              examples:
                invalidBody:
                  summary: Request body is not valid JSON
                  value:
                    error: "Invalid request body"
                wrongStatus:
                  summary: status field is not ABANDONED
                  value:
                    error: "status must be ABANDONED"
        '401':
          description: Missing or invalid auth_token cookie.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Unauthorized"
        '403':
          description: Session belongs to a different user.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Forbidden"
        '404':
          description: No session found with the provided sessionId.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Session not found"
        '409':
          description: Session is already COMPLETED or ABANDONED (not IN_PROGRESS).
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Session is not in progress"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

  /api/evaluate:
    post:
      summary: Generate and persist a structured evaluation for a completed interview session
      operationId: evaluateSession
      tags: [evaluate]
      description: |
        Accepts a `sessionId`, loads all Turn rows for the session, and sends the full
        transcript to the AI provider (via `aiClient.complete`) to produce a structured
        evaluation. The AI response is expected to be a JSON object with `strengths`,
        `concerns`, and `overall_score` keys. Markdown fences are stripped before parsing.

        The resulting Evaluation row is persisted and the session is marked COMPLETED
        (with `endedAt` set) if it was not already. Returns the new evaluation record.

        Returns 409 if the session is ABANDONED or if an evaluation already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId:
                  type: string
                  example: clyyyy
      responses:
        '201':
          description: Evaluation created and persisted successfully.
          content:
            application/json:
              schema:
                type: object
                required: [id, strengths, concerns, score]
                properties:
                  id:
                    type: string
                    example: cleval000000000000000001
                  strengths:
                    type: array
                    items:
                      type: string
                    example: ["Strong TypeScript fundamentals", "Clear communication"]
                  concerns:
                    type: array
                    items:
                      type: string
                    example: ["Limited system design experience", "Shallow testing knowledge"]
                  score:
                    type: integer
                    minimum: 1
                    maximum: 10
                    example: 7
        '400':
          description: Validation error — sessionId is missing or empty.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "sessionId is required"
        '404':
          description: No session found with the provided sessionId.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Session not found"
        '409':
          description: |
            Conflict — either the session is ABANDONED and cannot be evaluated,
            or an evaluation already exists for this session.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
              examples:
                sessionAbandoned:
                  summary: Session status is ABANDONED
                  value:
                    error: "Session is not in progress or completed"
                evaluationExists:
                  summary: Evaluation row already exists for this session
                  value:
                    error: "Evaluation already exists"
        '502':
          description: AI provider returned an unparseable or malformed evaluation response.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "AI returned an unparseable evaluation"
        '500':
          description: Unexpected server error.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    example: "Internal server error"

# Additional endpoints are added here by backend-implementer agents as features are built.
# Each entry must include: summary, operationId, request body schema, response schemas, and error cases.
